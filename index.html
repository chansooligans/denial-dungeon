<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Denial Dungeon · a revenue-cycle roguelike</title>
    <meta name="description" content="Top-down action RPG roguelike teaching hospital revenue cycle through CARC denial codes, faction combat, and procedural dungeon runs." />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #0e1116; overflow: hidden; }
      #game {
        width: 100vw;
        /* 100vh on iOS includes the URL bar; dvh tracks the visible
           viewport as browser chrome shows/hides. */
        height: 100vh;
        height: 100dvh;
        /* No flex centering — Phaser's Scale.CENTER_BOTH already
           centers the canvas inside this div via margin. Layering
           both causes double-centering off the visible center. */
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
